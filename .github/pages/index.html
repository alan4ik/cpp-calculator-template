<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator — C++ Library</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 20px;
      color: #24292f;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    p  { color: #57606a; margin-top: 0.25rem; }
    .cards {
      display: flex;
      gap: 16px;
      margin-top: 40px;
    }
    .card {
      flex: 1;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9,105,218,.1);
    }
    .card h2 { margin: 0 0 8px; font-size: 1.1rem; }
    .card p  { margin: 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Calculator</h1>
  <p>Header-only C++11 arithmetic calculator library</p>

  <div class="cards">
    <a class="card" href="docs/">
      <h2>📖 Documentation</h2>
      <p>API reference generated by Doxygen</p>
    </a>
    <a class="card" href="coverage/">
      <h2>📊 Coverage</h2>
      <p>Code coverage report generated by lcov</p>
    </a>
  </div>
</body>
</html>
