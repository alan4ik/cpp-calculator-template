name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Разрешения нужны для upload-pages-artifact и deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build, test, coverage, docs
  # ────────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed for git tags → version

      - name: Install dependencies
        run: sudo apt-get install -y lcov doxygen graphviz

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCALCULATOR_COVERAGE=ON \
            -DCALCULATOR_BUILD_DOCS=ON

      - name: Build
        run: cmake --build build

      - name: Test + Coverage
        run: cmake --build build --target coverage

      - name: Docs
        run: cmake --build build --target docs

      # Собираем итоговую папку для GitHub Pages:
      #   public/           → landing page (генерируется здесь)
      #   public/docs/      → Doxygen docs
      #   public/coverage/  → lcov HTML
      - name: Prepare Pages
        run: |
          mkdir -p public/docs public/coverage

          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Calculator — C++ Library</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                     max-width: 600px; margin: 80px auto; padding: 0 20px; color: #24292f; }
              h1 { font-size: 2rem; margin-bottom: 0.25rem; }
              p  { color: #57606a; margin-top: 0.25rem; }
              .cards { display: flex; gap: 16px; margin-top: 40px; }
              .card  { flex: 1; border: 1px solid #d0d7de; border-radius: 8px; padding: 24px;
                       text-decoration: none; color: inherit; transition: border-color .15s, box-shadow .15s; }
              .card:hover { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.1); }
              .card h2 { margin: 0 0 8px; font-size: 1.1rem; }
              .card p  { margin: 0; font-size: 0.9rem; }
            </style>
          </head>
          <body>
            <h1>Calculator</h1>
            <p>Header-only C++11 arithmetic calculator library</p>
            <div class="cards">
              <a class="card" href="docs/"><h2>&#128218; Documentation</h2><p>API reference generated by Doxygen</p></a>
              <a class="card" href="coverage/"><h2>&#128202; Coverage</h2><p>Code coverage report generated by lcov</p></a>
            </div>
          </body>
          </html>
          EOF

          if [ -d build/docs/html ] && [ -n "$(ls -A build/docs/html 2>/dev/null)" ]; then
            cp -r build/docs/html/. public/docs/
          fi

          if [ -d build/coverage_html ] && [ -n "$(ls -A build/coverage_html 2>/dev/null)" ]; then
            cp -r build/coverage_html/. public/coverage/
          fi

          echo "=== public/ contents ==="
          find public -maxdepth 2 -type f | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy to GitHub Pages — только при пуше в main
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
